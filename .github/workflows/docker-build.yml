name: Build & Push Docker Images to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      BACKEND_REPO: underwriting-backend
      FRONTEND_REPO: underwriting-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Configure AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ Build & Push Backend Image
      - name: Build & Push Backend Image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build -t $BACKEND_REPO ./backend

          docker tag $BACKEND_REPO:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:$IMAGE_TAG

          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:$IMAGE_TAG

      # ✅ Build & Push Frontend Image
      - name: Build & Push Frontend Image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build -t $FRONTEND_REPO ./frontend

          docker tag $FRONTEND_REPO:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:$IMAGE_TAG

          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:$IMAGE_TAG